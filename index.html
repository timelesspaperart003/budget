<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>我們的帳本</title>
<meta name="description" content="情侶共用記帳 App"/>
<meta name="theme-color" content="#F2EFEA"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="我們的帳本"/>
<meta name="mobile-web-app-capable" content="yes"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png"/>
<link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#F2EFEA;--surface:#FAF8F5;--surface2:#EDEAE4;--border:#DDD8D0;
  --text:#4A4540;--sub:#9B9188;--mute:#C2BBB4;
  --rose:#C4A89A;--sage:#9BAF9E;--clay:#B89880;--slate:#8FA0AE;
  --lav:#AFA3BC;--wheat:#C8B98A;--mist:#A3B4B0;--blush:#D4B5AD;
  --warn:#C49A7A;--danger:#B87070;--green:#8FAF98;
}
body{font-family:'Noto Sans TC','PingFang TC',sans-serif;background:var(--bg);color:var(--text);max-width:430px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:84px;overflow-x:hidden;}
input,button{font-family:inherit;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
input[type=date]::-webkit-calendar-picker-indicator{opacity:.3;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,6px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes popIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}

/* ── Auth / Setup screens ── */
.auth-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;background:var(--bg);}
.auth-emoji{font-size:52px;margin-bottom:16px;}
.auth-title{font-family:'Noto Serif TC',serif;font-size:26px;font-weight:700;margin-bottom:6px;}
.auth-sub{font-size:13px;color:var(--sub);margin-bottom:28px;line-height:1.7;}
.auth-card{background:var(--surface);border-radius:20px;padding:22px 20px;width:100%;border:1px solid var(--border);margin-bottom:12px;text-align:left;}
.auth-card-title{font-size:10px;font-weight:700;color:var(--sub);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;}
.auth-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-size:15px;outline:none;background:var(--surface2);color:var(--text);margin-bottom:10px;display:block;}
.auth-input:focus{border-color:var(--clay);}
.auth-input.code{text-align:center;font-size:20px;font-weight:700;letter-spacing:4px;text-transform:uppercase;}
.auth-btn{width:100%;background:var(--clay);color:var(--surface);border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Serif TC',serif;letter-spacing:.5px;margin-bottom:8px;display:block;}
.auth-btn:disabled{opacity:.55;cursor:not-allowed;}
.auth-divider{font-size:11px;color:var(--mute);margin:6px 0;text-align:center;}
.auth-error{font-size:12px;color:var(--danger);margin:4px 0 8px;padding:8px 10px;background:rgba(184,112,112,.08);border-radius:8px;}
.auth-loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:20px 0;}
.loading-dot{width:7px;height:7px;border-radius:50%;background:var(--clay);animation:pulse 1.2s ease infinite;}
.loading-dot:nth-child(2){animation-delay:.2s;}
.loading-dot:nth-child(3){animation-delay:.4s;}
.hint{font-size:11px;color:var(--mute);margin-top:4px;line-height:1.5;}

/* ── Identity picker ── */
.identity-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;margin-top:4px;}
.identity-card{background:var(--surface);border:2px solid var(--border);border-radius:20px;padding:28px 16px;cursor:pointer;transition:all .2s;text-align:center;animation:popIn .3s ease;}
.identity-card:hover{border-color:var(--clay);transform:translateY(-2px);box-shadow:0 6px 20px rgba(184,152,128,.2);}
.identity-card:active{transform:scale(.97);}
.identity-emoji{font-size:42px;margin-bottom:10px;}
.identity-name{font-size:16px;font-weight:700;color:var(--text);}
.identity-room{font-size:11px;color:var(--mute);margin-top:4px;}

/* ── Header ── */
.header{position:sticky;top:0;z-index:50;display:flex;justify-content:space-between;align-items:center;padding:14px 18px 12px;background:rgba(242,239,234,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
.header-title-wrap{display:flex;align-items:center;gap:6px;}
.header-title{font-family:'Noto Serif TC',serif;font-size:16px;font-weight:700;letter-spacing:.3px;}
.header-title-edit{background:none;border:none;cursor:pointer;font-size:13px;color:var(--mute);padding:2px 4px;line-height:1;}
.header-sub{font-size:10px;color:var(--mute);margin-top:3px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.sync-dot{width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0;}
.sync-dot.syncing{animation:pulse 1s infinite;background:var(--warn);}
.who-badge{background:var(--surface2);border-radius:20px;padding:2px 8px;font-size:10px;color:var(--sub);border:1px solid var(--border);}
.edit-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:11px;color:var(--sub);cursor:pointer;white-space:nowrap;flex-shrink:0;}
.add-btn{width:38px;height:38px;border-radius:50%;background:var(--clay);border:none;color:var(--surface);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(184,152,128,.35);flex-shrink:0;}

/* ── Nav ── */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(250,248,245,.94);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 14px;z-index:100;}
.nav-btn{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;color:var(--mute);padding:4px 0;font-size:10px;letter-spacing:.5px;gap:3px;transition:color .2s;}
.nav-btn.active{color:var(--clay);}
.nav-icon{font-size:20px;}
.main{padding:14px 16px 0;animation:fadeUp .35s ease;}

/* ── Cards ── */
.card{background:var(--surface);border-radius:16px;padding:16px 16px 10px;margin-bottom:12px;border:1px solid var(--border);}
.card-title{font-family:'Noto Serif TC',serif;font-size:11px;font-weight:600;color:var(--sub);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;}
.fin-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;}
.fin-label{font-size:12px;color:var(--sub);}
.fin-val{font-size:15px;font-weight:700;}
.fin-divider{height:1px;background:var(--surface2);margin:3px 0;}
.last-saved-row{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding:9px 12px;background:var(--surface2);border-radius:10px;}
.progress-track{height:7px;background:var(--surface2);border-radius:6px;overflow:hidden;margin:6px 0;}
.progress-fill{height:100%;border-radius:6px;transition:width .7s cubic-bezier(.2,.8,.2,1);}
.hero-card{background:var(--surface);border-radius:16px;padding:14px 20px;margin-bottom:12px;border:1px solid var(--border);text-align:center;}
.hero-label{font-size:11px;color:var(--mute);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;}
.hero-amt{font-family:'Noto Serif TC',serif;font-size:26px;font-weight:700;letter-spacing:-1px;}
.hero-sub{display:flex;justify-content:center;gap:20px;margin-top:7px;flex-wrap:wrap;}
.hero-partner{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--sub);}
.hero-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.warn-banner{margin-top:9px;background:rgba(196,154,122,.12);border:1px solid rgba(196,154,122,.35);border-radius:8px;padding:7px 10px;font-size:11px;color:var(--warn);}

/* ── Records ── */
.rec-row{display:flex;align-items:center;gap:10px;padding:9px 6px;border-radius:8px;border-bottom:1px solid var(--surface2);transition:background .15s;}
.rec-row:hover{background:var(--surface2);}
.rec-row:hover .del-btn{opacity:1!important;}
.rec-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.rec-note{font-size:14px;font-weight:500;}
.rec-meta{font-size:11px;color:var(--mute);margin-top:1px;}
.rec-amt{font-size:13px;font-weight:700;color:var(--clay);white-space:nowrap;}
.del-btn{background:none;border:none;cursor:pointer;font-size:16px;color:var(--mute);padding:0 2px;opacity:0;transition:opacity .2s;line-height:1;}
.edit-rec-btn{background:none;border:none;cursor:pointer;font-size:13px;color:var(--mute);padding:0 2px;opacity:0;transition:opacity .2s;line-height:1;}
.rec-row:hover .edit-rec-btn{opacity:1!important;}
.del-placeholder{width:22px;flex-shrink:0;}
.empty{text-align:center;color:var(--mute);padding:20px 0;font-size:13px;}

/* ── Calendar ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-wd{text-align:center;font-size:10px;color:var(--mute);padding:4px 0;font-weight:600;}
.cal-cell{aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:2px;}
.cal-cell.has-rec{background:var(--surface2);}
.cal-cell.selected{background:rgba(184,152,128,.15);outline:1.5px solid var(--clay);}
.cal-day{font-size:12px;font-weight:500;}
.cal-dot{width:4px;height:4px;border-radius:50%;background:var(--clay);}

/* ── Stat bars ── */
.bar-track{display:flex;border-radius:8px;overflow:hidden;height:28px;margin-top:4px;}
.bar-a{background:var(--rose);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--surface);font-weight:600;min-width:16%;transition:width .5s;}
.bar-b{background:var(--sage);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--surface);font-weight:600;min-width:16%;transition:width .5s;}
.partner-card{background:var(--surface2);border-radius:12px;padding:12px 14px;}

/* ── Legend ── */
.legend-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--surface2);}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.legend-label{flex:1;font-size:13px;color:var(--sub);}
.legend-val{font-size:13px;font-weight:600;}

/* ── Mini bar chart ── */
.mini-bar-wrap{display:flex;align-items:flex-end;gap:6px;height:80px;padding:0 4px;}
.mini-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.mini-bar{width:100%;background:var(--clay);border-radius:3px 3px 0 0;}
.mini-bar-label{font-size:9px;color:var(--mute);}

/* ── Modals ── */
.overlay{position:fixed;inset:0;background:rgba(60,50,44,.45);z-index:200;display:flex;align-items:flex-end;backdrop-filter:blur(6px);}
.modal-card{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 20px 36px;width:100%;max-width:430px;margin:0 auto;max-height:90vh;overflow-y:auto;animation:slideUp .3s cubic-bezier(.2,.8,.2,1);}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 16px;}
.modal-title{font-family:'Noto Serif TC',serif;font-size:17px;font-weight:700;margin-bottom:16px;}
.field{margin-bottom:14px;}
.field label{font-size:10px;color:var(--sub);font-weight:700;display:block;margin-bottom:6px;letter-spacing:1px;text-transform:uppercase;}
.field input{width:100%;border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;font-size:14px;outline:none;color:var(--text);background:var(--surface2);}
.field input:focus{border-color:var(--clay);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.cat-chip{border:1.5px solid var(--border);border-radius:8px;padding:7px 3px;font-size:11px;cursor:pointer;background:var(--surface2);color:var(--sub);text-align:center;transition:all .15s;}
.paid-display{background:var(--surface2);border-radius:10px;padding:10px 14px;font-size:14px;color:var(--sub);border:1.5px solid var(--border);}
.submit-btn{width:100%;background:var(--clay);color:var(--surface);border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;letter-spacing:1px;font-family:'Noto Serif TC',serif;}
.submit-btn:disabled{opacity:.55;cursor:not-allowed;}
.quick-btns{display:flex;gap:8px;margin-bottom:4px;}
.quick-btn{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:8px 2px;font-size:12px;cursor:pointer;background:var(--surface2);color:var(--sub);transition:all .15s;}
.quick-btn.active{background:var(--clay);color:var(--surface);border-color:var(--clay);}


/* ── Toast ── */
.toast{position:fixed;bottom:94px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--surface);padding:9px 20px;border-radius:100px;font-size:12px;z-index:999;white-space:nowrap;letter-spacing:.5px;animation:toastIn .3s ease;pointer-events:none;display:none;}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, set, push, remove, update, get }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getAuth, signInAnonymously, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const fbApp = initializeApp({
  apiKey:"AIzaSyB6nRaty2eGUyCh6OmNMXcA--ZQGXhQqTs",
  authDomain:"budget-1a242.firebaseapp.com",
  projectId:"budget-1a242",
  storageBucket:"budget-1a242.firebasestorage.app",
  messagingSenderId:"859928758854",
  appId:"1:859928758854:web:516f763d92b206e3b29847",
  databaseURL:"https://budget-1a242-default-rtdb.asia-southeast1.firebasedatabase.app"
});
const db=getDatabase(fbApp), auth=getAuth(fbApp);

const CATEGORIES=["🍽 餐點","🧋 飲料","🚗 交通","🎬 娛樂","🛒 購物","🏠 居家","✈️ 旅遊","💊 醫療","💰 其他"];
const CAT_COLORS=["#C4A89A","#B8A9E3","#9BAF9E","#B89880","#8FA0AE","#AFA3BC","#C8B98A","#A3B4B0","#D4B5AD"];
const MEAL_TYPES=["🌅 早餐","☀️ 午餐","🌙 晚餐","🍰 點心"];
const FOOD_CATS=["🍽 餐點","🧋 飲料"]; // categories that show restaurant field
const P_COLORS=["var(--rose)","var(--sage)"];

// ── State ─────────────────────────────────────────────────────────────────────
let authUser=null;
let roomId=null;           // set after password verified
let myIndex=null;          // 0 or 1 — picked each session
// screen: 'loading' | 'login' | 'setup' | 'identity' | 'app'
let screen="loading";
let tab="home", records={}, syncing=false, modal=null;
let settings={
  budget:10000,budget0:5000,budget1:5000,
  salary0:30000,salary1:30000,
  savingsGoal0:8000,savingsGoal1:7000,
  lastSaved0:0,lastSaved1:0,
  bookTitle:"我們的帳本",names:["小美","小丑"],nameEmojis:["🌸","🤡"]
};
let finView="combined"; // "combined" | "individual"
let calView="combined"; // "combined" | "individual"
let calMonth={y:new Date().getFullYear(),m:new Date().getMonth()}, calSel=null;

let form=freshForm(), budgetDraft="", editKey=null; // editKey: key of record being edited
let authError="";
let setupDraft={bookTitle:"我們的帳本",name0:"小美",emoji0:"🌸",name1:"小丑",emoji1:"🤡"};
let unsubRec, unsubSet;

function freshForm(){ return {date:today(),amount:"",category:CATEGORIES[0],mealType:"",restaurant:"",paidBy:myIndex??0,note:"",splitEvenly:false}; }
function today(){ return new Date().toISOString().slice(0,10); }
function thisMonthKey(){ const n=new Date();return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}`; }
function genCode(){ return Math.random().toString(36).slice(2,8).toUpperCase(); }
function names(){ return settings.names||["小美","小丑"]; }
function emojis(){ return settings.nameEmojis||["🌸","🤡"]; }
function label(i){ return `${emojis()[i]} ${names()[i]}`; }

async function hashPw(pw){
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

// ── Firebase ──────────────────────────────────────────────────────────────────
function rRef(...p){ return ref(db,["rooms",roomId,...p].join("/")); }

function subscribeRoom(){
  if(unsubRec) unsubRec();
  if(unsubSet) unsubSet();
  unsubRec=onValue(rRef("records"),s=>{ records=s.val()||{}; if(screen==="app") render(); });
  unsubSet=onValue(rRef("settings"),s=>{ if(s.val()) settings={...settings,...s.val()}; if(screen==="app"||screen==="identity") render(); });
}

async function fbAdd(rec){ syncing=true; render(); await push(rRef("records"),rec); syncing=false; }
async function fbDel(key){ await remove(rRef("records",key)); }
async function fbUpdate(key,patch){ await update(rRef("records",key),patch); }
async function fbSave(p){ await update(rRef("settings"),p); settings={...settings,...p}; }

// ── Auth ──────────────────────────────────────────────────────────────────────
async function createRoom(code,pw){
  const btn=document.getElementById("btn-create");
  if(btn){btn.disabled=true;btn.textContent="建立中…";}
  authError="";
  try{
    const[hash,existing]=await Promise.all([
      hashPw(pw),
      get(ref(db,`roomAuth/${code}/pwHash`))
    ]);
    if(existing.exists()){ authError="此房間碼已存在，請換一個"; render(); return; }
    await set(ref(db,`roomAuth/${code}`),{pwHash:hash,createdAt:Date.now()});
    roomId=code;
    subscribeRoom();
    screen="setup";
    render();
  }catch(e){ authError="建立失敗，請重試"; render(); }
}

async function joinRoom(code,pw){
  const btn=document.getElementById("btn-join");
  if(btn){btn.disabled=true;btn.textContent="驗證中…";}
  authError="";
  try{
    const[hash,snap]=await Promise.all([
      hashPw(pw),
      get(ref(db,`roomAuth/${code}/pwHash`))
    ]);
    if(!snap.exists()){ authError="找不到此房間，請確認房間碼"; render(); return; }
    if(hash!==snap.val()){ authError="密碼錯誤，請再試一次"; render(); return; }
    roomId=code;
    subscribeRoom();
    screen="identity";
    render();
  }catch(e){ authError="加入失敗，請重試"; render(); }
}

async function finishSetup(){
  const btn=document.getElementById("btn-setup-done");
  if(btn){btn.disabled=true;btn.textContent="儲存中…";}
  const patch={
    bookTitle:setupDraft.bookTitle||"我們的帳本",
    names:[setupDraft.name0||"小美",setupDraft.name1||"小丑"],
    nameEmojis:[setupDraft.emoji0||"🌸",setupDraft.emoji1||"🤡"]
  };
  await fbSave(patch);
  screen="identity";
  render();
}

function pickIdentity(idx){
  myIndex=idx;
  screen="app";
  form=freshForm();
  render();
}

function leaveRoom(){
  if(!confirm("確定要離開？\n（資料不會消失，下次用房間碼＋密碼可再進來）")) return;
  if(unsubRec) unsubRec();
  if(unsubSet) unsubSet();
  roomId=null; myIndex=null; screen="login"; authError="";
  records={}; settings={budget:10000,budget0:5000,budget1:5000,
    salary0:30000,salary1:30000,
    savingsGoal0:8000,savingsGoal1:7000,lastSaved0:0,lastSaved1:0,
    bookTitle:"我們的帳本",names:["小美","小丑"],nameEmojis:["🌸","🤡"]};
  render();
}



// ── Derived ───────────────────────────────────────────────────────────────────
function recList(){ return Object.entries(records).map(([k,v])=>({...v,_key:k})).sort((a,b)=>b.date.localeCompare(a.date)); }
function totalByPartner(){ const t=[0,0]; recList().forEach(r=>{t[r.paidBy]+=r.amount;}); return t; }
function thisMonthSpent(){ return recList().filter(r=>r.date.slice(0,7)===thisMonthKey()).reduce((s,r)=>s+r.amount,0); }
function catData(){ const m={}; recList().forEach(r=>{m[r.category]=(m[r.category]||0)+r.amount;}); return Object.entries(m).map(([n,v])=>({name:n,value:v})); }
function barData(){ const mo={}; recList().forEach(r=>{const k=r.date.slice(0,7);mo[k]=(mo[k]||0)+r.amount;}); return Object.entries(mo).sort().slice(-6).map(([m,v])=>({name:m.slice(5)+"月",value:v})); }
function calDays(){ const{y,m}=calMonth,first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate(),g=[];for(let i=0;i<first;i++)g.push(null);for(let d=1;d<=days;d++){const ds=`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`,dr=recList().filter(r=>r.date===ds);g.push({d,dateStr:ds,recs:dr,total:dr.reduce((s,r)=>s+r.amount,0)});}return g;}
function monthTotal(){ const{y,m}=calMonth;return recList().filter(r=>{const d=new Date(r.date);return d.getFullYear()===y&&d.getMonth()===m;}).reduce((s,r)=>s+r.amount,0);}

// ── Render router ─────────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById("app");
  if(screen==="loading"){ app.innerHTML=`<div class="auth-screen"><div class="auth-loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div></div>`; return; }
  if(screen==="login")   { app.innerHTML=renderLogin();    bindLoginEvents();    return; }
  if(screen==="setup")   { app.innerHTML=renderSetup();    bindSetupEvents();    return; }
  if(screen==="identity"){ app.innerHTML=renderIdentity(); bindIdentityEvents(); return; }
  app.innerHTML=renderApp(); bindAppEvents();
}

function bindLoginEvents(){
  const jc=document.getElementById("join-code"), jp=document.getElementById("join-pw");
  const nc=document.getElementById("new-code"), np=document.getElementById("new-pw"), np2=document.getElementById("new-pw2");
  if(jc) jc.oninput=e=>{e.target.value=e.target.value.toUpperCase();};
  if(nc) nc.oninput=e=>{e.target.value=e.target.value.toUpperCase();};

  document.getElementById("btn-join").onclick=async()=>{
    const code=(jc?.value||"").trim().toUpperCase(), pw=(jp?.value||"").trim();
    if(!code){ authError="請輸入房間碼"; render(); return; }
    if(!pw){ authError="請輸入密碼"; render(); return; }
    await joinRoom(code,pw);
  };
  document.getElementById("btn-create").onclick=async()=>{
    const code=(nc?.value||"").trim().toUpperCase()||genCode();
    const pw=(np?.value||"").trim(), pw2=(np2?.value||"").trim();
    if(!pw){ authError="請設定密碼"; render(); return; }
    if(pw.length<4){ authError="密碼至少 4 個字元"; render(); return; }
    if(pw!==pw2){ authError="兩次密碼不一致"; render(); return; }
    await createRoom(code,pw);
  };
  jp?.addEventListener("keydown",e=>{ if(e.key==="Enter") document.getElementById("btn-join")?.click(); });
  np2?.addEventListener("keydown",e=>{ if(e.key==="Enter") document.getElementById("btn-create")?.click(); });
}

// ── Main App ──────────────────────────────────────────────────────────────────
function renderApp(){
  const tbp=totalByPartner(),total=tbp[0]+tbp[1],spent=thisMonthSpent();
  const{budget,budget0,budget1,salary0,salary1,savingsGoal0,savingsGoal1,lastSaved0,lastSaved1,bookTitle}=settings;

  const totalSavingsGoal=(savingsGoal0||0)+(savingsGoal1||0);
  const totalLastSaved=(lastSaved0||0)+(lastSaved1||0);
  const budgetPct=budget>0?Math.min(spent/budget*100,100):0;
  const budgetLeft=budget-spent,budgetOver=budgetLeft<0;
  const proj=totalSalary-spent,savRate=totalSavingsGoal>0?Math.min(proj/totalSavingsGoal*100,100):0;
  const lastRate=totalSavingsGoal>0?(totalLastSaved/totalSavingsGoal*100).toFixed(0):0;
  const budgetBarColor=budgetOver?"var(--danger)":budgetPct>=80?"var(--warn)":"var(--sage)";

      <button class="nav-btn ${tab===k?"active":""}" data-tab="${k}"><span class="nav-icon">${ic}</span>${lb}</button>`).join("")}

}

// ── Chart ─────────────────────────────────────────────────────────────────────
function renderChart(){
  const cd=catData();
  if(!cd.length) return `<div class="card"><div class="card-title">分類佔比</div><div class="empty">尚無資料</div></div>`;
  const total=cd.reduce((s,d)=>s+d.value,0);
  let paths="",offset=0; const r=70,cx=110,cy=90,circ=2*Math.PI*r;
  cd.forEach((d,i)=>{const pct=d.value/total,dash=pct*circ,gap=circ-dash;paths+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${CAT_COLORS[i%CAT_COLORS.length]}" stroke-width="28" stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})"/>`;offset+=dash;});
  return `<div class="card"><div class="card-title">分類佔比</div>
    <svg width="100%" viewBox="0 0 220 180" style="display:block;margin:0 auto">${paths}
      <text x="${cx}" y="${cy+5}" text-anchor="middle" font-size="11" fill="var(--sub)">總支出</text>
      <text x="${cx}" y="${cy+20}" text-anchor="middle" font-size="13" font-weight="700" fill="var(--text)">NT$ ${total.toLocaleString()}</text>
    </svg>
    <div style="border-top:1px solid var(--surface2);padding-top:10px;margin-top:4px">
      ${cd.map((d,i)=>`<div class="legend-row"><span class="legend-dot" style="background:${CAT_COLORS[i%CAT_COLORS.length]}"></span><span class="legend-label">${d.name}</span><span class="legend-val">NT$ ${d.value.toLocaleString()}</span></div>`).join("")}
    </div></div>`;
}

}

    <div class="modal-handle"></div><div class="modal-title">修改成員名稱</div>
    <div class="field"><label>第一位</label>
      <div style="display:flex;gap:8px">
        <input id="nm-e0" value="${e[0]}" style="width:56px;text-align:center;font-size:20px;border:1.5px solid var(--border);border-radius:9px;padding:9px 4px;background:var(--surface2);outline:none;color:var(--text)"/>
        <input id="nm-n0" value="${n[0]}" style="flex:1;border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;font-size:14px;background:var(--surface2);outline:none;color:var(--text)"/>
      </div>
    </div>
    <div class="field"><label>第二位</label>
      <div style="display:flex;gap:8px">
        <input id="nm-e1" value="${e[1]}" style="width:56px;text-align:center;font-size:20px;border:1.5px solid var(--border);border-radius:9px;padding:9px 4px;background:var(--surface2);outline:none;color:var(--text)"/>
        <input id="nm-n1" value="${n[1]}" style="flex:1;border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;font-size:14px;background:var(--surface2);outline:none;color:var(--text)"/>
      </div>
    </div>
    <button class="submit-btn" id="btn-names-save">儲存</button>
  </div></div>`;
}

  return `<div class="overlay" id="overlay"><div class="modal-card" style="max-height:44vh">
    <div class="modal-handle"></div><div class="modal-title">修改帳本名稱</div>
    <div class="field"><label>帳本名稱</label><input id="title-input" value="${settings.bookTitle||"我們的帳本"}" style="font-size:16px"/></div>
    <button class="submit-btn" id="btn-title-save">儲存</button>
  </div></div>`;
}

    <div class="modal-handle"></div><div class="modal-title">⚙ 設定</div>

    <div style="font-size:10px;font-weight:700;color:var(--sub);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">帳本</div>
    <div class="field"><label>帳本名稱</label><input id="set-title" value="${settings.bookTitle||"我們的帳本"}"/></div>

    <div class="field"><label>第一位</label>
      <div style="display:flex;gap:8px">
        <input id="set-e0" value="${e[0]}" style="width:56px;text-align:center;font-size:20px;border:1.5px solid var(--border);border-radius:9px;padding:9px 4px;background:var(--surface2);outline:none;color:var(--text)"/>
        <input id="set-n0" value="${n[0]}" style="flex:1;border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;font-size:14px;background:var(--surface2);outline:none;color:var(--text)"/>
      </div>
    </div>
    <div class="field"><label>第二位</label>
      <div style="display:flex;gap:8px">
        <input id="set-e1" value="${e[1]}" style="width:56px;text-align:center;font-size:20px;border:1.5px solid var(--border);border-radius:9px;padding:9px 4px;background:var(--surface2);outline:none;color:var(--text)"/>
        <input id="set-n1" value="${n[1]}" style="flex:1;border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;font-size:14px;background:var(--surface2);outline:none;color:var(--text)"/>
      </div>
    </div>

    <div style="font-size:10px;font-weight:700;color:var(--sub);letter-spacing:1px;text-transform:uppercase;margin:14px 0 10px">修改密碼</div>

    <div class="field"><label>確認新密碼</label><input id="set-pw-new2" type="password" placeholder="再輸入一次"/></div>
    <div id="set-pw-msg" style="font-size:12px;color:var(--danger);margin:-8px 0 10px;display:none"></div>

// ── App Events ────────────────────────────────────────────────────────────────
function bindAppEvents(){
  document.querySelectorAll(".nav-btn").forEach(b=>{ b.onclick=()=>{tab=b.dataset.tab;render();}; });
  document.getElementById("btn-add").onclick=()=>{modal="add";form=freshForm();render();};
  document.getElementById("btn-leave").onclick=leaveRoom;
  const elTitle=document.getElementById("btn-edit-title"); if(elTitle) elTitle.onclick=()=>{modal="title";render();};
  const elSettings=document.getElementById("btn-settings"); if(elSettings) elSettings.onclick=()=>{modal="settings";render();};
  const elFin=document.getElementById("btn-fin"); if(elFin) elFin.onclick=()=>{modal="finance";render();};
  const elFinCombined=document.getElementById("fin-view-combined");
  const elFinIndividual=document.getElementById("fin-view-individual");
  if(elFinCombined) elFinCombined.onclick=()=>{finView="combined";render();};
  if(elFinIndividual) elFinIndividual.onclick=()=>{finView="individual";render();};
  const elBudCombined=document.getElementById("bud-view-combined");
  const elBudIndividual=document.getElementById("bud-view-individual");
  if(elBudCombined) elBudCombined.onclick=()=>{finView="combined";render();};
  if(elBudIndividual) elBudIndividual.onclick=()=>{finView="individual";render();};
  const elBudget=document.getElementById("btn-budget"); if(elBudget) elBudget.onclick=()=>{modal="budget";render();};
  const elNames=document.getElementById("btn-names"); if(elNames) elNames.onclick=()=>{modal="names";render();};

  document.querySelectorAll(".del-btn").forEach(b=>{
    b.onclick=()=>{ if(confirm("確定刪除這筆支出？")) fbDel(b.dataset.key); };
  });
  document.querySelectorAll(".edit-rec-btn").forEach(b=>{
    b.onclick=()=>{ editKey=b.dataset.key; modal="edit"; render(); };
  });

  const cp=document.getElementById("cal-prev"),cn=document.getElementById("cal-next");
  if(cp) cp.onclick=()=>{let{y,m}=calMonth;m--;if(m<0){m=11;y--;}calMonth={y,m};render();};
  if(cn) cn.onclick=()=>{let{y,m}=calMonth;m++;if(m>11){m=0;y++;}calMonth={y,m};render();};
  document.querySelectorAll(".cal-cell").forEach(c=>{ c.onclick=()=>{calSel=calSel===c.dataset.date?null:c.dataset.date;render();}; });
  const cvC=document.getElementById("cal-view-combined"),cvP0=document.getElementById("cal-view-p0"),cvP1=document.getElementById("cal-view-p1");
  if(cvC) cvC.onclick=()=>{calView="combined";calSel=null;render();};
  if(cvP0) cvP0.onclick=()=>{calView="p0";calSel=null;render();};
  if(cvP1) cvP1.onclick=()=>{calView="p1";calSel=null;render();};

  const ov=document.getElementById("overlay");
  if(ov) ov.onclick=e=>{ if(e.target===ov){modal=null;render();} };

  if(modal==="add"){
    document.getElementById("f-date").onchange=e=>{form.date=e.target.value;};
    document.getElementById("f-amount").oninput=e=>{form.amount=e.target.value; if(form.splitEvenly) render();};
    document.getElementById("f-note").oninput=e=>{form.note=e.target.value;};
    const fRest=document.getElementById("f-restaurant");
    if(fRest) fRest.oninput=e=>{form.restaurant=e.target.value;};
    document.querySelectorAll(".cat-chip").forEach(b=>{b.onclick=()=>{form.category=b.dataset.cat;form.mealType="";form.restaurant="";render();};});
    document.querySelectorAll(".meal-btn").forEach(b=>{b.onclick=()=>{form.mealType=b.dataset.meal;render();};});
    document.querySelectorAll(".rest-suggest").forEach(b=>{b.onclick=()=>{form.restaurant=b.dataset.rest;render();};});
    document.querySelectorAll(".paid-btn").forEach(b=>{b.onclick=()=>{form.paidBy=+b.dataset.paid;render();};});
    const splitNo=document.getElementById("split-no"), splitYes=document.getElementById("split-yes");
    if(splitNo) splitNo.onclick=()=>{form.splitEvenly=false;render();};
    if(splitYes) splitYes.onclick=()=>{form.splitEvenly=true;render();};

    document.getElementById("btn-submit").onclick=async()=>{
      if(!form.amount||isNaN(+form.amount)) return showToast("請輸入正確金額");
      const btn=document.getElementById("btn-submit");
      btn.disabled=true; btn.textContent="記帳中…";
      const{date,category,note,splitEvenly}=form;
      const total=+form.amount;
      if(splitEvenly){
        // Write two separate records, one per person, each half the amount
        const half=Math.round(total/2*100)/100;
        const remainder=Math.round((total-half)*100)/100;
        const mealType=form.mealType||"", restaurant=form.restaurant||"";
        await Promise.all([
          fbAdd({date,amount:half,category,mealType,restaurant,paidBy:0,note:note||(names()[0]+" 攤分"),splitFrom:true}),
          fbAdd({date,amount:remainder,category,mealType,restaurant,paidBy:1,note:note||(names()[1]+" 攤分"),splitFrom:true})
        ]);
        showToast(`✦ 已各記 NT$ ${half.toLocaleString()} 和 NT$ ${remainder.toLocaleString()}`);
      } else {
        await fbAdd({date,amount:total,category,mealType:form.mealType||"",restaurant:form.restaurant||"",paidBy:form.paidBy??myIndex,note});
        showToast("✦ 記帳成功");
      }
      modal=null; form=freshForm(); render();
    };
  }
  if(modal==="budget"){
    document.getElementById("budget-input").oninput=e=>{budgetDraft=e.target.value;};
    document.querySelectorAll(".quick-btn").forEach(b=>{b.onclick=()=>{budgetDraft=b.dataset.val;render();};});
    document.getElementById("btn-budget-save").onclick=async()=>{
      const v=+document.getElementById("budget-input").value;
      const v0=+document.getElementById("budget-p0").value;
      const v1=+document.getElementById("budget-p1").value;
      if(!v||isNaN(v)||v<=0) return showToast("請輸入有效預算");
      await fbSave({budget:v, budget0:v0||0, budget1:v1||0});
      modal=null; render(); showToast("✦ 預算已更新");
    };
  }
  if(modal==="finance"){
    const s0=document.getElementById("fin-s0"),s1=document.getElementById("fin-s1");
    const g0=document.getElementById("fin-g0"),g1=document.getElementById("fin-g1");
    const l0=document.getElementById("fin-l0"),l1=document.getElementById("fin-l1");
    document.getElementById("btn-fin-save").onclick=async()=>{
      const p={};
      if(+s0.value>=0) p.salary0=+s0.value;
      if(+s1.value>=0) p.salary1=+s1.value;
      if(+g0.value>=0) p.savingsGoal0=+g0.value;
      if(+g1.value>=0) p.savingsGoal1=+g1.value;
      if(+l0.value>=0) p.lastSaved0=+l0.value;
      if(+l1.value>=0) p.lastSaved1=+l1.value;
      if(Object.keys(p).length) await fbSave(p);
      modal=null; render(); showToast("✦ 財務資訊已更新");
    };
  }
  if(modal==="names"){
    document.getElementById("btn-names-save").onclick=async()=>{
      const e0=document.getElementById("nm-e0").value||emojis()[0];
      const n0=document.getElementById("nm-n0").value||names()[0];
      const e1=document.getElementById("nm-e1").value||emojis()[1];
      const n1=document.getElementById("nm-n1").value||names()[1];
      await fbSave({names:[n0,n1],nameEmojis:[e0,e1]});
      modal=null; render(); showToast("✦ 名稱已更新");
    };
  }
  if(modal==="edit"&&editKey&&records[editKey]){
    // local draft for edit — update records[editKey] in place for re-renders
    document.querySelectorAll(".e-cat").forEach(b=>{
      b.onclick=()=>{ records[editKey]={...records[editKey],category:b.dataset.cat,mealType:""}; render(); };
    });
    document.querySelectorAll(".e-meal-btn").forEach(b=>{
      b.onclick=()=>{ records[editKey]={...records[editKey],mealType:b.dataset.meal}; render(); };
    });
    document.querySelectorAll(".e-rest-suggest").forEach(b=>{
      b.onclick=()=>{ records[editKey]={...records[editKey],restaurant:b.dataset.rest}; render(); };
    });
    const eRest=document.getElementById("e-restaurant");
    if(eRest) eRest.oninput=e=>{ records[editKey]={...records[editKey],restaurant:e.target.value}; };
    document.querySelectorAll(".e-paid-btn").forEach(b=>{
      b.onclick=()=>{ records[editKey]={...records[editKey],paidBy:+b.dataset.paid}; render(); };
    });
    document.getElementById("btn-edit-save").onclick=async()=>{
      const date=document.getElementById("e-date").value;
      const amount=+document.getElementById("e-amount").value;
      const note=document.getElementById("e-note").value;
      const restaurant=document.getElementById("e-restaurant")?.value||"";
      if(!amount||isNaN(amount)) return showToast("請輸入正確金額");
      const btn=document.getElementById("btn-edit-save");
      btn.disabled=true; btn.textContent="儲存中…";
      const{category,paidBy,mealType}=records[editKey];
      await fbUpdate(editKey,{date,amount,category,mealType:mealType||"",restaurant,paidBy,note});
      modal=null; editKey=null; render(); showToast("✦ 已更新");
    };
  }
  if(modal==="title"){
    const ti=document.getElementById("title-input");
    document.getElementById("btn-title-save").onclick=async()=>{
      const v=ti.value.trim()||"我們的帳本";
      await fbSave({bookTitle:v}); modal=null; render(); showToast("✦ 帳本名稱已更新");
    };
    ti.onkeydown=e=>{ if(e.key==="Enter") document.getElementById("btn-title-save").click(); };
  }
  if(modal==="settings"){
    document.getElementById("btn-settings-save").onclick=async()=>{
      const p={};
      const title=document.getElementById("set-title").value.trim();
      const e0=document.getElementById("set-e0").value||emojis()[0];
      const n0=document.getElementById("set-n0").value||names()[0];
      const e1=document.getElementById("set-e1").value||emojis()[1];
      const n1=document.getElementById("set-n1").value||names()[1];
      if(title) p.bookTitle=title;
      p.names=[n0,n1]; p.nameEmojis=[e0,e1];

      // Password change (optional)
      const pwOld=document.getElementById("set-pw-old").value.trim();
      const pwNew=document.getElementById("set-pw-new").value.trim();
      const pwNew2=document.getElementById("set-pw-new2").value.trim();
      const msg=document.getElementById("set-pw-msg");
      if(pwNew||pwOld){
        if(!pwOld){ msg.textContent="請輸入目前密碼"; msg.style.display="block"; return; }
        if(pwNew.length<4){ msg.textContent="新密碼至少 4 個字元"; msg.style.display="block"; return; }
        if(pwNew!==pwNew2){ msg.textContent="兩次新密碼不一致"; msg.style.display="block"; return; }
        // Verify old password
        const [oldHash, snap] = await Promise.all([
          hashPw(pwOld),
          get(ref(db,`roomAuth/${roomId}/pwHash`))
        ]);
        if(oldHash!==snap.val()){ msg.textContent="目前密碼錯誤"; msg.style.display="block"; return; }
        // Save new password
        const newHash=await hashPw(pwNew);
        await set(ref(db,`roomAuth/${roomId}/pwHash`),newHash);
        showToast("✦ 密碼已更新");
      }

      if(Object.keys(p).length) await fbSave(p);
      modal=null; render(); showToast("✦ 設定已儲存");
    };
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
signInAnonymously(auth).catch(()=>{});

onAuthStateChanged(auth, user=>{
  if(user){
    authUser=user;
    screen="login";
    render();
  } else {
    signInAnonymously(auth).catch(()=>{ screen="login"; render(); });
  }
});
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('/sw.js').catch(()=>{});
  });
}
</script>
